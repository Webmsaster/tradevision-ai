name: Dependabot Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-automerge:
    # Phase 48 (R45-CFG-2): pull_request_target gives the workflow access to
    # repo secrets even on PRs from forks. Restrict to PRs originating from
    # THIS repository to defeat any "spoof the bot name" supply-chain attack.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch/minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --repo "$GITHUB_REPOSITORY" "$PR_NUMBER" --approve -b "Auto-approving Dependabot ${{ steps.metadata.outputs.update-type }}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Enable auto-merge for patch/minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --repo "$GITHUB_REPOSITORY" "$PR_NUMBER" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
