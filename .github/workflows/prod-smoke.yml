name: Production Smoke Check

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: read

concurrency:
  group: prod-smoke-main
  cancel-in-progress: false

jobs:
  prod-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run production smoke check
        run: node ./scripts/prod-smoke.mjs
        env:
          SMOKE_BASE_URL: ${{ vars.PROD_SMOKE_BASE_URL }}
          SMOKE_FAILURE_SCREENSHOT: artifacts/prod-smoke-failure.png

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-failure
          path: artifacts/
          if-no-files-found: ignore
