name: Semantic PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  semantic-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: $PR_TITLE"
          REGEX='^(feat|fix|perf|refactor|docs|chore|ci|test|build)(\([a-z0-9._/-]+\))?!?: .+'
          if [[ "$PR_TITLE" =~ $REGEX ]]; then
            echo "Semantic PR title is valid."
            exit 0
          fi

          echo "Invalid PR title."
          echo "Expected format: type(scope): summary"
          echo "Allowed types: feat, fix, perf, refactor, docs, chore, ci, test, build"
          exit 1
