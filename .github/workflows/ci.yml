name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Phase 48 (R45-CFG-3): least-privilege default token. CI only needs to
# read the repo + pull deps; default token granted `contents: write` and
# more across all jobs.
permissions:
  contents: read

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production dependencies (fail on moderate+)
        # Round 54: tightened from high → moderate. Single accepted advisory
        # is GHSA-qx2v-qp2m-jg93 (postcss XSS via unescaped </style>) which
        # is pulled in transitively by Next.js. Only fix is `npm audit fix
        # --force` → next@9.3.3 (breaking downgrade). We instead pin & accept
        # this one ID until Next.js ships a non-vulnerable postcss
        # transitively; surface count is asserted to be exactly 2 advisories
        # (the postcss CVE + its `next` parent). Any new CVE breaks CI.
        run: |
          set +e
          AUDIT_JSON=$(npm audit --omit=dev --audit-level=moderate --json)
          AUDIT_EXIT=$?
          set -e
          echo "$AUDIT_JSON" | node -e '
            const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const allow = new Set(["GHSA-qx2v-qp2m-jg93"]);
            const advs = Object.values(data.vulnerabilities || {}).flatMap(v => v.via || []).filter(v => typeof v === "object");
            const ids = new Set(advs.map(a => a.url?.split("/").pop()).filter(Boolean));
            const unexpected = [...ids].filter(id => !allow.has(id));
            if (unexpected.length) {
              console.error("Unexpected advisories beyond allow-list:", unexpected);
              process.exit(1);
            }
            console.error("All advisories within allow-list:", [...ids].join(", ") || "(none)");
          '

  test:
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
      - name: Run Lighthouse CI performance assertions
        # Phase 93 (R51-S9): SHA-pinned third-party action (was @v12 floating).
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E suite
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
